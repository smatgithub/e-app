# e-Food Center — local / VM Compose (Stage A)
# Docs: docs/config/01-docker.md

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-efood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-efood_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-efood}
    volumes:
      - efood_pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efood} -d ${POSTGRES_DB:-efood}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-efood}:${POSTGRES_PASSWORD:-efood_dev_change_me}@db:5432/${POSTGRES_DB:-efood}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      OTP_STUB: ${OTP_STUB:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      APP_VERSION: ${APP_VERSION:-0.0.1}
    ports:
      - "${API_PORT:-4000}:4000"

volumes:
  efood_pg_data:
